<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINE · Painel Meta Ads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<!-- guarda de auth: redireciona antes de qualquer render -->
<script>try{if(!sessionStorage.getItem("mine_auth_v1"))window.location.replace("login.html");}catch(e){}</script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="mine_logo.png" alt="Mine" class="topbar-logo-img"
           onerror="this.style.display='none';document.getElementById('tbFallback').style.display='grid'">
      <div class="logo" id="tbFallback" style="display:none">M</div>
      <div>
        <h1 id="agency">Mine Agência Digital</h1>
        <span>Painel Meta Ads</span>
      </div>
    </div>

    <div class="viewsel">
      <label>Tela</label>
      <select id="viewSel"></select>
    </div>

    <div class="spacer"></div>

    <div class="df-wrap" id="dfWrap">
      <button class="df-toggle" id="dfToggle" type="button">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x=".7" y="2.1" width="12.6" height="10.5" rx="2" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M.7 5.25h12.6M4.55 1.05v2.1M9.45 1.05v2.1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <span id="dfLabel">30 dias</span>
        <svg class="df-caret" width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="df-panel" id="dfPanel" hidden>
        <div class="df-presets">
          <button class="df-preset" data-preset="7d" type="button">Últimos 7 dias</button>
          <button class="df-preset active" data-preset="30d" type="button">Últimos 30 dias</button>
          <button class="df-preset" data-preset="month" type="button">Este mês</button>
          <button class="df-preset" data-preset="lastmonth" type="button">Mês passado</button>
        </div>
        <div class="df-sep"></div>
        <div class="df-custom">
          <div class="df-custom-label">Personalizado</div>
          <div class="df-inputs">
            <div class="df-date-g"><span>De</span><input type="date" id="dfFrom"></div>
            <div class="df-date-g"><span>Até</span><input type="date" id="dfTo"></div>
          </div>
          <button class="df-apply" id="dfApply" type="button">Aplicar</button>
        </div>
      </div>
    </div>
    <div class="meta-date" id="gendate"></div>
    <div class="user-pill" id="userPill"></div>
  </header>

  <main class="wrap">
    <div id="overview"></div>
    <div id="detail" hidden></div>

    <footer class="foot">
      <span class="dot"></span>
      <span>Painel gerado a partir de dados reais da API Meta Ads.</span>
      <span style="margin-left:auto">Mine Agência Digital · protótipo de layout</span>
    </footer>
  </main>

  <script src="data.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
