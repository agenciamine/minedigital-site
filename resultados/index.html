<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINE · Painel Meta Ads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<!-- guarda de auth: redireciona antes de qualquer render -->
<script>try{if(!sessionStorage.getItem("mine_auth_v1"))window.location.replace("login.html");}catch(e){}</script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="mine_logo.png" alt="Mine" class="topbar-logo-img"
           onerror="this.style.display='none';document.getElementById('tbFallback').style.display='grid'">
      <div class="logo" id="tbFallback" style="display:none">M</div>
      <div>
        <h1 id="agency">Mine Agência Digital</h1>
        <span>Painel Meta Ads</span>
      </div>
    </div>

    <div class="viewsel">
      <label>Tela</label>
      <select id="viewSel"></select>
    </div>

    <div class="spacer"></div>

    <div class="period" role="tablist" aria-label="Período">
      <button data-p="7">7 dias</button>
      <button data-p="30">30 dias</button>
      <button data-p="90">90 dias</button>
    </div>
    <div class="meta-date" id="gendate"></div>
    <div class="user-pill" id="userPill"></div>
  </header>

  <main class="wrap">
    <div id="overview"></div>
    <div id="detail" hidden></div>

    <footer class="foot">
      <span class="dot"></span>
      <span>Painel gerado a partir de dados reais da API Meta Ads.</span>
      <span style="margin-left:auto">Mine Agência Digital · protótipo de layout</span>
    </footer>
  </main>

  <script src="data.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
